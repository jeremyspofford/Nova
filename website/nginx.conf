server {
    listen 4000;

    root /usr/share/nginx/html;
    index index.html;

    # Static site — serve files directly, fall back to 404 page
    location / {
        try_files $uri $uri/index.html =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
