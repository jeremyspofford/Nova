services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova}
      POSTGRES_DB: ${POSTGRES_DB:-nova}
    volumes:
      - nova_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova} -d ${POSTGRES_DB:-nova}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../services/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nova:nova@db:5432/nova}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-local}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      HA_BASE_URL: ${HA_BASE_URL:-}
      HA_TOKEN: ${HA_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  nova-lite:
    build:
      context: ../services/nova-lite
    depends_on:
      api:
        condition: service_healthy
    environment:
      NOVA_API_URL: ${NOVA_API_URL:-http://api:8000}
      LOOP_INTERVAL_SECONDS: ${LOOP_INTERVAL_SECONDS:-15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - nova-lite-state:/app/state
    restart: unless-stopped

  board:
    build:
      context: ../services/board
      args:
        VITE_API_URL: ""
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  nova_db:
  nova-lite-state:
