services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova
    volumes:
      - nova_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../services/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://nova:nova@db:5432/nova
      DEPLOYMENT_MODE: local
    depends_on:
      db:
        condition: service_healthy

volumes:
  nova_db:
