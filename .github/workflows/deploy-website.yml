name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website

      # If the Cloudflare secrets aren't set yet, the build above already
      # validated the website compiles cleanly — useful as a smoke test.
      # The deploy step will fail loudly when secrets are missing so the
      # operator knows to add them, rather than silently skipping.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Production project lives at arialabs.ai. If you renamed the
          # Cloudflare Pages project, update --project-name= below to match.
          command: pages deploy website/dist --project-name=nova-website --branch=main --commit-dirty=true
