# Ruff linter config — all Python services share this
[lint]
select = ["E", "F", "W", "I"]  # pycodestyle errors/warnings, pyflakes, isort
ignore = [
    "E501",   # line too long — let developers decide
    "E731",   # lambda assignment — used in FastAPI deps
    "F841",   # local var assigned but unused — common in try/except patterns
    "E402",   # module-level import not at top — service main.py files use late
              # imports for FastAPI router registration order and circular-dep
              # avoidance, which is intentional throughout this codebase
]

[lint.per-file-ignores]
"*/migrations/*.sql" = ["ALL"]
"**/test_*.py" = ["F811"]  # redefined-unused-name (pytest fixtures)

[format]
quote-style = "double"
indent-style = "space"
