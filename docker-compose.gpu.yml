# Nova AI Platform — NVIDIA GPU overlay
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
#   OR let setup.sh auto-detect (it adds this file when nvidia-smi is found):
#   ./scripts/setup.sh
#
#   OR force-enable by setting NOVA_GPU=nvidia in .env
#
# Prerequisites:
#   Windows (WSL2 + Docker Desktop):
#     1. Install NVIDIA driver >= 520 for Windows (not inside WSL)
#     2. Docker Desktop → Settings → Resources → WSL Integration → enable distro
#     3. No separate nvidia-container-toolkit needed — Docker Desktop handles it
#     4. Verify: docker run --rm --gpus all nvidia/cuda:12.3-base nvidia-smi
#
#   Linux:
#     sudo apt install -y nvidia-container-toolkit
#     sudo nvidia-ctk runtime configure --runtime=docker
#     sudo systemctl restart docker
#     Verify: docker run --rm --gpus all nvidia/cuda:12.3-base nvidia-smi
#
# Note: macOS (Apple Silicon) does NOT use this file.
#       Ollama detects the Metal GPU automatically with no configuration needed.
# ─────────────────────────────────────────────────────────────────────────────

services:
  ollama:
    # Same ollama/ollama:latest image — GPU access is granted via the runtime,
    # not a different image. The container automatically uses CUDA when available.
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all              # use "count: 1" to limit to a single GPU
              capabilities: [gpu]

  nova-vllm:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
